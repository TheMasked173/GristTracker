<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grist Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Grist Tracker</h1>

<!-- GRIST -->
<div class="card">
  <h2>Grist Loyalty</h2>
  <div class="count" id="loyalty">3</div>
  <button class="add" onclick="gristPlus()">+1 Bulk</button>
  <button class="sub" onclick="change('loyalty', -2)">-2</button>
  <button class="alt" onclick="gristUlt()">-5 Ultimate</button>
  <button class="sub" onclick="customGristSub()">Custom -</button>
  <button class="reset" onclick="resetGrist()">Reset to 3</button>
  <button class="reset" onclick="newGame()">New Game</button>
</div>

<!-- GRAVE -->
<div class="card">
  <h2>Creatures in Graveyard</h2>
  <div class="count" id="grave">0</div>
  <button class="add" onclick="addGrave()">+ Add Creature</button>
  <button class="add" onclick="addGravePrompt()">+ Add Custom</button>
  <button class="sub" onclick="removeGrave()">- Remove Creature</button>
  <button class="sub" onclick="removeGravePrompt()">- Remove Custom</button>
  <button class="reset" onclick="exileGrave()">Exile Graveyard</button>
</div>

<!-- TOTAL BUGS -->
<div class="card">
  <h2>Total Bugs</h2>
  <div class="count" id="totalBugs">0</div>
</div>

<!-- INSECTS -->
<!-- INSECTS -->
<div class="card">
  <h2>Insect Zones</h2>

  <div class="zone-row">
    <button class="add" onclick="change('ready', 1)">+</button>
    <div><div class="small">Ready</div><div class="count" id="ready">0</div></div>
    <button class="sub" onclick="change('ready', -1)">-</button>
  </div>

  <div class="zone-row">
    <button class="add" onclick="change('sick', 1)">+</button>
    <div><div class="small">Summoning Sick</div><div class="count" id="sick">0</div></div>
    <button class="sub" onclick="change('sick', -1)">-</button>
  </div>

  <div class="zone-row">
    <button class="add" onclick="change('tapped', 1)">+</button>
    <div><div class="small">Tapped</div><div class="count" id="tapped">0</div></div>
    <button class="sub" onclick="change('tapped', -1)">-</button>
  </div>

  <br>
  <button class="alt" onclick="tapReady()">Tap Ready</button>
  <button class="alt" onclick="untapOne()">Untap One</button>
  <br><br>
  <button class="alt" onclick="nextTurn()">Next Turn</button>
  <br><br>
  <button class="sub" onclick="boardWipe()">Board Wipe</button>
</div>

<!-- TOGGLES -->
<div class="card">
  <h2>Toggles</h2>
  <div class="toggle">
    <label class="switch">
      <input type="checkbox" id="enterTapped">
      <span class="slider"></span>
    </label>
    Enters Tapped
  </div>
  <div class="toggle">
    <label class="switch">
      <input type="checkbox" id="hasteToggle">
      <span class="slider"></span>
    </label>
    Haste
  </div>
  <div class="toggle">
    <label class="switch">
      <input type="checkbox" id="staticWipe">
      <span class="slider"></span>
    </label>
    Static Board Wipe
  </div>
  <div class="toggle">
    <label class="switch">
      <input type="checkbox" id="staticExile">
      <span class="slider"></span>
    </label>
    Static Exile
  </div>
</div>
<!-- ULT OVERLAY -->
<div id="ultOverlay"></div>

<script src="app.js"></script>

<script>
function updateTotalBugs() {
  const r = parseInt(ready.innerText)||0;
  const s = parseInt(sick.innerText)||0;
  const t = parseInt(tapped.innerText)||0;
  totalBugs.innerText = r+s+t;
}
['ready','sick','tapped'].forEach(id=>{
  new MutationObserver(updateTotalBugs)
  .observe(document.getElementById(id),{childList:true,subtree:true});
});
updateTotalBugs();
</script>

</body>
</html>
